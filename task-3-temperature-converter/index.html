<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-container">
        <h2>🌡️ Temperature Converter</h2>
        <div class="input-group">
            <label for="tempInput">Enter Temperature:</label>
            <input type="number" id="tempInput" placeholder="Eg: 25" step="any">
        </div>
        <div class="input-group">
            <label for="unitSelect">From Unit:</label>
            <select id="unitSelect">
                <option value="Celsius">Celsius (°C)</option>
                <option value="Fahrenheit">Fahrenheit (°F)</option>
                <option value="Kelvin">Kelvin (K)</option>
            </select>
        </div>
        <button id="convertBtn">Convert Now</button>
        <div id="errorMessage" class="error-msg"></div>
        <div class="results-box">
            <h3>Converted Values:</h3>
            <p id="resultCelsius">Celsius: --</p>
            <p id="resultFahrenheit">Fahrenheit: --</p>
            <p id="resultKelvin">Kelvin: --</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
